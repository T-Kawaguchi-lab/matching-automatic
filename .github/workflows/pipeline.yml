name: Forms Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'incoming/forms_latest.xlsx'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f automation/requirements.txt ]; then pip install -r automation/requirements.txt; fi
          if [ -f matching_app/requirements.txt ]; then pip install -r matching_app/requirements.txt; fi

      - name: Prepare folders
        run: mkdir -p incoming data matching_app/data

      - name: Check input file
        shell: bash
        run: |
          python - << 'PY'
          from pathlib import Path
          p = Path("incoming/forms_latest.xlsx")
          if not p.exists():
              raise SystemExit("incoming/forms_latest.xlsx がありません。")
          print(f"input file found: {p}")
          PY

      - name: Run pipeline
        run: python automation/run_pipeline.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data matching_app/data
          git diff --cached --quiet || git commit -m "Auto update data from Forms response"
          git push