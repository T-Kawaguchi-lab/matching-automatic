name: Forms Pipeline

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forms_response_submitted]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f automation/requirements.txt ]; then pip install -r automation/requirements.txt; fi
          if [ -f matching_app/requirements.txt ]; then pip install -r matching_app/requirements.txt; fi

      - name: Prepare folders
        run: mkdir -p incoming data matching_app/data

      - name: Restore latest Excel from repository_dispatch payload
        if: github.event_name == 'repository_dispatch'
        shell: bash
        run: |
          python - << 'PY'
          import json, os, base64, pathlib
          event_path = os.environ["GITHUB_EVENT_PATH"]
          p = pathlib.Path("incoming/forms_latest.xlsx")
          data = json.loads(pathlib.Path(event_path).read_text(encoding="utf-8"))
          payload = data.get("client_payload", {})
          excel_b64 = payload.get("excel_base64")
          if not excel_b64:
              raise SystemExit("excel_base64 not found in repository_dispatch payload")
          p.write_bytes(base64.b64decode(excel_b64))
          print(f"saved {p}")
          PY

      - name: Check manual test file
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          python - << 'PY'
          from pathlib import Path
          p = Path("incoming/forms_latest.xlsx")
          if not p.exists():
              raise SystemExit("workflow_dispatch で動かす場合は、先に incoming/forms_latest.xlsx を repo に入れてください。")
          print(f"manual test file found: {p}")
          PY

      - name: Run pipeline
        run: python automation/run_pipeline.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data matching_app/data
          git diff --cached --quiet || git commit -m "Auto update data from Forms response"
          git push